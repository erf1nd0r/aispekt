# Release: cross-build the CLI, assemble npm platform packages, publish, and
# attach binaries to the GitHub release. Triggered ONLY by a v* tag push —
# nothing here runs on ordinary commits.
#
# Required repo secret: NPM_TOKEN (automation token with publish rights).
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # npm provenance

jobs:
  build:
    strategy:
      matrix:
        include:
          - { os: macos-14, target: aarch64-apple-darwin, slug: darwin-arm64 }
          - { os: macos-13, target: x86_64-apple-darwin, slug: darwin-x64 }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, slug: linux-x64 }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-musl, slug: linux-arm64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, slug: win32-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - if: startsWith(matrix.slug, 'linux')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      # --release for both: tests reuse the build's artifacts (no second
      # debug compile) and exercise the exact optimization profile shipped.
      - run: cargo build --release -p aispekt --target ${{ matrix.target }}
      - run: cargo test --release -p aispekt --target ${{ matrix.target }}
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p stage
          BIN=aispekt$([[ "${{ matrix.slug }}" == win32-* ]] && echo .exe || true)
          cp "target/${{ matrix.target }}/release/$BIN" "stage/$BIN"
      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.slug }}
          path: stage/*

  publish:
    needs: [build, ci] # ci must gate publishing — a red workspace must never reach the registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # OIDC trusted publishing needs npm >= 11.5.1; Node 22 bundles npm 10.x
      - run: npm install -g npm@latest && npm --version
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Version sanity — tag must match every pinned version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./npm/aispekt/package.json').version")
          [ "$TAG" = "$PKG" ] || { echo "tag v$TAG != npm/aispekt version $PKG"; exit 1; }
          # every optionalDependencies pin must equal the tag, or the wrapper
          # silently resolves last release's binaries
          node -e '
            const p = require("./npm/aispekt/package.json");
            const tag = process.argv[1];
            const bad = Object.entries(p.optionalDependencies).filter(([, v]) => v !== tag);
            if (bad.length) { console.error("stale optionalDependencies pins:", bad); process.exit(1); }
          ' "$TAG"
          CARGO=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          [ "$TAG" = "$CARGO" ] || { echo "tag v$TAG != Cargo workspace version $CARGO (aispekt --version would lie)"; exit 1; }
      - name: Assemble platform packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for slug in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            node npm/make-platform-package.mjs "$slug" "artifacts/bin-$slug/aispekt" "$VERSION" out
          done
          node npm/make-platform-package.mjs win32-x64 artifacts/bin-win32-x64/aispekt.exe "$VERSION" out
      - name: Publish platform packages (idempotent — reruns skip published versions)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for d in out/aispekt-*; do
            PKG=$(basename "$d")
            if npm view "$PKG@$VERSION" version >/dev/null 2>&1; then
              echo "$PKG@$VERSION already on the registry — skipping"
            else
              (cd "$d" && npm publish --provenance --access public)
            fi
          done
      - name: Publish wrapper (idempotent)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "aispekt@$VERSION" version >/dev/null 2>&1; then
            echo "aispekt@$VERSION already on the registry — skipping"
          else
            cd npm/aispekt && npm publish --provenance --access public
          fi
      - name: Attach binaries to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p release
          for slug in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            tar -C "artifacts/bin-$slug" -czf "release/aispekt-$VERSION-$slug.tar.gz" aispekt
          done
          (cd artifacts/bin-win32-x64 && zip -q "../../release/aispekt-$VERSION-win32-x64.zip" aispekt.exe)
          gh release create "$VERSION" --generate-notes release/* || gh release upload "$VERSION" release/* --clobber

  ci:
    # Full-workspace gate for tag builds — publish depends on this job, so a
    # red workspace (clippy included) blocks the registry push.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace && cargo clippy --workspace --all-targets -- -D warnings
