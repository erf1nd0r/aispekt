name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - run: cargo test --workspace
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # wasm release build is covered by the web job (bun run build → build:wasm);
      # a fast type-level signal here avoids paying the LTO compile twice
      - run: cargo check -p aispekt-wasm --target wasm32-unknown-unknown

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: bun install
      - run: bun run build # tsc --noEmit && wasm build && vite build
      - run: bun test
